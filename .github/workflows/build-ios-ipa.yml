name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Detect Workspace and Scheme
        id: detect
        run: |
          WORKSPACE=$(find ios -maxdepth 2 -name "*.xcworkspace" -not -path "*/Pods/*" | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: no .xcworkspace found"; exit 1
          fi
          # Main scheme = name of the .xcodeproj at the root of ios/
          PROJECT=$(find ios -maxdepth 2 -name "*.xcodeproj" -not -path "*/Pods/*" | head -n 1)
          if [ -z "$PROJECT" ]; then
            echo "Error: no main .xcodeproj found at ios/"; exit 1
          fi
          SCHEME=$(basename "$PROJECT" .xcodeproj)
          echo "Workspace: $WORKSPACE"
          echo "Project:   $PROJECT"
          echo "Scheme:    $SCHEME"
          # Sanity check: confirm scheme exists in workspace
          xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | grep -q "    $SCHEME$" \
            || { echo "Scheme '$SCHEME' not found in workspace. Available:"; xcodebuild -list -workspace "$WORKSPACE"; exit 1; }
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build Unsigned App
        run: |
          set +e
          xcodebuild build \
            -workspace "${{ steps.detect.outputs.workspace }}" \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build_dir \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            > build.log 2>&1
          BUILD_STATUS=$?
          set -e

          echo "::group::Build errors only"
          grep -Ei "(^|[:[:space:]])error:|\\*\\* BUILD|Undefined symbol|ld:|fatal error|❌" build.log | tail -n 120 || true
          echo "::endgroup::"

          if [ "$BUILD_STATUS" -ne 0 ] || grep -q "\*\* BUILD FAILED \*\*" build.log; then
            echo "::group::Last 80 lines of build log"
            tail -n 80 build.log
            echo "::endgroup::"
            exit 1
          fi

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build.log

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build_dir -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app file found! Printing generated files for diagnosis:"
            find build_dir/Build/Products -type d
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r iFinance.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: iFinance.ipa
