name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Detect Workspace and Scheme
        id: detect
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -not -path "*/Pods/*" -maxdepth 3 | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: no .xcworkspace found"
            find ios -maxdepth 3 -name "*.xcworkspace"
            exit 1
          fi
          # Pick the first user scheme from the workspace
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/ {flag=1; next} flag && NF {print; exit}' \
            | xargs)
          if [ -z "$SCHEME" ]; then
            echo "Error: no scheme found in $WORKSPACE"
            xcodebuild -list -workspace "$WORKSPACE"
            exit 1
          fi
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build Unsigned App
        run: |
          xcodebuild build \
            -workspace "${{ steps.detect.outputs.workspace }}" \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build_dir \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -quiet

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build_dir -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app file found! Printing generated files for diagnosis:"
            find build_dir/Build/Products -type d
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r iFinance.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: iFinance.ipa
